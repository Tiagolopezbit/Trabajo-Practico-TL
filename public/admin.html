<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - E-Commerce</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; }
    nav {
      background: #2c3e50;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    nav h1 { color: white; font-size: 24px; }
    nav div a { color: white; text-decoration: none; margin-left: 20px; }
    .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
    h2 { margin-bottom: 20px; color: #2c3e50; }
    .form-card {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      margin-bottom: 40px;
    }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; color: #666; }
    input, textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 16px;
    }
    textarea { height: 80px; resize: vertical; }
    button {
      background: #3498db;
      color: white;
      border: none;
      padding: 12px 25px;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover { background: #2980b9; }
    .productos-lista { }
    .producto-item {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      margin-bottom: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .producto-item h3 { margin-bottom: 5px; }
    .producto-item p { color: #666; }
    .producto-item .precio { font-weight: bold; color: #2c3e50; }
    .btn-eliminar {
      background: #e74c3c;
      color: white;
      border: none;
      padding: 8px 15px;
      border-radius: 5px;
      cursor: pointer;
    }
    .mensaje {
      padding: 10px;
      border-radius: 5px;
      margin-top: 10px;
      display: none;
      text-align: center;
    }
  </style>
</head>
<body>

  <nav>
    <h1>⚙️ Panel Admin</h1>
    <div>
      <a href="index.html">Ver tienda</a>
      <a href="login.html">Login</a>
    </div>
  </nav>

  <div class="container">

    <div class="form-card">
      <h2>➕ Agregar Producto</h2>
      <div class="form-group">
        <label>Nombre</label>
        <input type="text" id="nombre" placeholder="Nombre del producto">
      </div>
      <div class="form-group">
        <label>Descripción</label>
        <textarea id="descripcion" placeholder="Descripción del producto"></textarea>
      </div>
      <div class="form-group">
        <label>Precio</label>
        <input type="number" id="precio" placeholder="0.00">
      </div>
      <div class="form-group">
        <label>Categoría</label>
        <input type="text" id="categoria" placeholder="Ej: ropa, electrónica">
      </div>
      <button onclick="agregarProducto()">Agregar Producto</button>
      <p class="mensaje" id="mensaje"></p>
    </div>

    <h2>📦 Productos cargados</h2>
    <div id="productos-lista"></div>

  </div>

  <script>
    const API = 'http://localhost:3000';
    const token = localStorage.getItem('token');

    async function agregarProducto() {
      const nombre = document.getElementById('nombre').value;
      const descripcion = document.getElementById('descripcion').value;
      const precio = document.getElementById('precio').value;
      const categoria = document.getElementById('categoria').value;

      if (!nombre || !precio) {
        alert('Nombre y precio son obligatorios');
        return;
      }

      try {
        const res = await fetch(`${API}/api/productos`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'authorization': token
          },
          body: JSON.stringify({ nombre, descripcion, precio: Number(precio), categoria })
        });

        const data = await res.json();
        const mensaje = document.getElementById('mensaje');
        mensaje.style.display = 'block';

        if (res.ok) {
          mensaje.style.color = 'green';
          mensaje.textContent = '¡Producto agregado exitosamente! ✅';
          document.getElementById('nombre').value = '';
          document.getElementById('descripcion').value = '';
          document.getElementById('precio').value = '';
          document.getElementById('categoria').value = '';
          cargarProductos();
        } else {
          mensaje.style.color = 'red';
          mensaje.textContent = 'Error al agregar producto';
        }
      } catch (error) {
        alert('Error al conectar con el servidor');
      }
    }

    async function cargarProductos() {
      try {
        const res = await fetch(`${API}/api/productos`);
        const productos = await res.json();
        const lista = document.getElementById('productos-lista');

        if (productos.length === 0) {
          lista.innerHTML = '<p>No hay productos cargados.</p>';
          return;
        }

        lista.innerHTML = productos.map(p => `
          <div class="producto-item">
            <div>
              <h3>${p.nombre}</h3>
              <p>${p.descripcion || 'Sin descripción'} — ${p.categoria || 'Sin categoría'}</p>
              <p class="precio">$${p.precio}</p>
            </div>
            <button class="btn-eliminar" onclick="eliminarProducto('${p._id}')">Eliminar</button>
          </div>
        `).join('');
      } catch (error) {
        document.getElementById('productos-lista').innerHTML = '<p>Error al cargar productos</p>';
      }
    }

    async function eliminarProducto(id) {
      if (!confirm('¿Seguro que querés eliminar este producto?')) return;

      await fetch(`${API}/api/productos/${id}`, {
        method: 'DELETE',
        headers: { 'authorization': token }
      });
      cargarProductos();
    }

    cargarProductos();
  </script>

</body>
</html>
