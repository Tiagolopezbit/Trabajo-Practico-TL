<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - GOTTI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #111; color: white; }
    nav {
      background: #000;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid white;
    }
    nav h1 { color: white; font-size: 28px; letter-spacing: 4px; }
    nav div a { color: white; text-decoration: none; margin-left: 20px; letter-spacing: 1px; }
    nav div a:hover { color: #aaa; }
    .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
    h2 { margin-bottom: 20px; letter-spacing: 3px; border-bottom: 1px solid #333; padding-bottom: 10px; }
    .form-card {
      background: #1a1a1a;
      border: 1px solid #333;
      padding: 30px;
      margin-bottom: 40px;
    }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; color: #aaa; letter-spacing: 1px; font-size: 13px; }
    input, textarea {
      width: 100%;
      padding: 12px;
      background: #111;
      border: 1px solid #333;
      color: white;
      font-size: 15px;
    }
    input:focus, textarea:focus { outline: none; border-color: white; }
    textarea { height: 80px; resize: vertical; }
    button {
      background: white;
      color: black;
      border: none;
      padding: 12px 25px;
      font-size: 15px;
      font-weight: bold;
      letter-spacing: 2px;
      cursor: pointer;
      margin-top: 10px;
    }
    button:hover { background: #ddd; }
    .producto-item {
      background: #1a1a1a;
      border: 1px solid #333;
      padding: 20px;
      margin-bottom: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .producto-item h3 { margin-bottom: 5px; letter-spacing: 1px; }
    .producto-item p { color: #aaa; font-size: 14px; }
    .producto-item .precio { font-weight: bold; font-size: 18px; }
    .btn-eliminar {
      background: transparent;
      color: #e74c3c;
      border: 1px solid #e74c3c;
      padding: 8px 15px;
      cursor: pointer;
      letter-spacing: 1px;
      font-weight: bold;
    }
    .btn-eliminar:hover { background: #e74c3c; color: white; }
    .mensaje { text-align: center; margin-top: 10px; display: none; font-size: 13px; }
    footer {
      background: #000;
      color: #aaa;
      text-align: center;
      padding: 20px;
      margin-top: 40px;
      border-top: 1px solid #333;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>

  <nav>
    <h1>GOTTI</h1>
    <div>
      <a href="index.html">VER TIENDA</a>
      <a href="login.html">LOGIN</a>
    </div>
  </nav>

  <div class="container">

    <div class="form-card">
      <h2>➕ AGREGAR PRODUCTO</h2>
      <div class="form-group">
        <label>NOMBRE</label>
        <input type="text" id="nombre" placeholder="Nombre del producto">
      </div>
      <div class="form-group">
        <label>DESCRIPCIÓN</label>
        <textarea id="descripcion" placeholder="Descripción del producto"></textarea>
      </div>
      <div class="form-group">
        <label>PRECIO</label>
        <input type="number" id="precio" placeholder="0.00">
      </div>
      <div class="form-group">
        <label>CATEGORÍA</label>
        <input type="text" id="categoria" placeholder="Ej: ropa, electrónica">
      </div>
      <button onclick="agregarProducto()">AGREGAR PRODUCTO</button>
      <p class="mensaje" id="mensaje"></p>
    </div>

    <h2>📦 PRODUCTOS CARGADOS</h2>
    <div id="productos-lista"></div>

  </div>

  <footer>
    <p>© 2026 GOTTI — TODOS LOS DERECHOS RESERVADOS</p>
  </footer>

  <script>
    const API = 'http://localhost:3000';
    const token = localStorage.getItem('token');

    async function agregarProducto() {
      const nombre = document.getElementById('nombre').value;
      const descripcion = document.getElementById('descripcion').value;
      const precio = document.getElementById('precio').value;
      const categoria = document.getElementById('categoria').value;

      if (!nombre || !precio) {
        alert('Nombre y precio son obligatorios');
        return;
      }

      try {
        const res = await fetch(`${API}/api/productos`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'authorization': token
          },
          body: JSON.stringify({ nombre, descripcion, precio: Number(precio), categoria })
        });

        const data = await res.json();
        const mensaje = document.getElementById('mensaje');
        mensaje.style.display = 'block';

        if (res.ok) {
          mensaje.style.color = '#2ecc71';
          mensaje.textContent = '¡Producto agregado exitosamente! ✅';
          document.getElementById('nombre').value = '';
          document.getElementById('descripcion').value = '';
          document.getElementById('precio').value = '';
          document.getElementById('categoria').value = '';
          cargarProductos();
        } else {
          mensaje.style.color = '#e74c3c';
          mensaje.textContent = 'Error al agregar producto';
        }
      } catch (error) {
        alert('Error al conectar con el servidor');
      }
    }

    async function cargarProductos() {
      try {
        const res = await fetch(`${API}/api/productos`);
        const productos = await res.json();
        const lista = document.getElementById('productos-lista');

        if (productos.length === 0) {
          lista.innerHTML = '<p style="color:#aaa">No hay productos cargados.</p>';
          return;
        }

        lista.innerHTML = productos.map(p => `
          <div class="producto-item">
            <div>
              <h3>${p.nombre}</h3>
              <p>${p.descripcion || 'Sin descripción'} — ${p.categoria || 'Sin categoría'}</p>
              <p class="precio">$${p.precio}</p>
            </div>
            <button class="btn-eliminar" onclick="eliminarProducto('${p._id}')">ELIMINAR</button>
          </div>
        `).join('');
      } catch (error) {
        document.getElementById('productos-lista').innerHTML = '<p style="color:#aaa">Error al cargar productos</p>';
      }
    }

    async function eliminarProducto(id) {
      if (!confirm('¿Seguro que querés eliminar este producto?')) return;
      await fetch(`${API}/api/productos/${id}`, {
        method: 'DELETE',
        headers: { 'authorization': token }
      });
      cargarProductos();
    }

    cargarProductos();
  </script>

</body>
</html>
