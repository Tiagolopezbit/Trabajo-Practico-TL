<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrito - GOTTI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #111; color: white; }
    nav {
      background: #000;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid white;
    }
    nav h1 { color: white; font-size: 28px; letter-spacing: 4px; }
    nav div a { color: white; text-decoration: none; margin-left: 20px; letter-spacing: 1px; }
    nav div a:hover { color: #aaa; }
    .container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
    h2 { margin-bottom: 20px; letter-spacing: 3px; border-bottom: 1px solid #333; padding-bottom: 10px; }
    .carrito-item {
      background: #1a1a1a;
      border: 1px solid #333;
      padding: 20px;
      margin-bottom: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .carrito-item h3 { margin-bottom: 5px; letter-spacing: 1px; }
    .carrito-item p { color: #aaa; font-size: 14px; }
    .carrito-item .precio { font-size: 20px; font-weight: bold; }
    .carrito-item button {
      background: transparent;
      color: #e74c3c;
      border: 1px solid #e74c3c;
      padding: 8px 15px;
      cursor: pointer;
      letter-spacing: 1px;
    }
    .carrito-item button:hover { background: #e74c3c; color: white; }
    .total {
      background: #1a1a1a;
      border: 1px solid #333;
      padding: 20px;
      text-align: right;
    }
    .total h3 { font-size: 22px; margin-bottom: 15px; letter-spacing: 2px; }
    .total button {
      background: white;
      color: black;
      border: none;
      padding: 13px 30px;
      font-size: 15px;
      font-weight: bold;
      letter-spacing: 2px;
      cursor: pointer;
    }
    .total button:hover { background: #ddd; }
    .vacio { text-align: center; padding: 60px; color: #aaa; }
    .vacio a { color: white; }
    footer {
      background: #000;
      color: #aaa;
      text-align: center;
      padding: 20px;
      margin-top: 40px;
      border-top: 1px solid #333;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>

  <nav>
    <h1>GOTTI</h1>
    <div>
      <a href="index.html">INICIO</a>
      <a href="login.html">LOGIN</a>
      <a href="carrito.html">CARRITO 🛒</a>
    </div>
  </nav>

  <div class="container">
    <h2>🛒 MI CARRITO</h2>
    <div id="carrito-items"></div>
    <div id="total-section"></div>
  </div>

  <footer>
    <p>© 2026 GOTTI — TODOS LOS DERECHOS RESERVADOS</p>
  </footer>

  <script>
    const API = 'http://localhost:3000';
    const token = localStorage.getItem('token');

    if (!token) {
      alert('Debes iniciar sesión');
      window.location.href = 'login.html';
    }

    async function cargarCarrito() {
      try {
        const res = await fetch(`${API}/api/carrito`, {
          headers: { 'authorization': token }
        });
        const data = await res.json();
        const container = document.getElementById('carrito-items');
        const totalSection = document.getElementById('total-section');

        if (!data.items || data.items.length === 0) {
          container.innerHTML = '<div class="vacio"><h3>Tu carrito está vacío</h3><p><a href="index.html">← Ver productos</a></p></div>';
          return;
        }

        container.innerHTML = data.items.map(item => `
          <div class="carrito-item">
            <div>
              <h3>${item.producto.nombre}</h3>
              <p>Cantidad: ${item.cantidad}</p>
            </div>
            <div class="precio">₲ ${(item.producto.precio * item.cantidad).toLocaleString()}</div>
            <button onclick="quitarItem('${item.producto._id}')">QUITAR</button>
          </div>
        `).join('');

        totalSection.innerHTML = `
          <div class="total">
            <h3>TOTAL: ₲ ${data.total.toLocaleString()}</h3>
            <button onclick="confirmarOrden()">CONFIRMAR ORDEN ✅</button>
          </div>
        `;
      } catch (error) {
        document.getElementById('carrito-items').innerHTML = '<p style="color:#aaa">Error al cargar el carrito</p>';
      }
    }

    async function quitarItem(productoId) {
      await fetch(`${API}/api/carrito/${productoId}`, {
        method: 'DELETE',
        headers: { 'authorization': token }
      });
      cargarCarrito();
    }

    async function confirmarOrden() {
      const direccion = prompt('Ingresá tu dirección de envío:');
      if (!direccion) return;

      const res = await fetch(`${API}/api/ordenes`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'authorization': token
        },
        body: JSON.stringify({ direccionEnvio: direccion })
      });

      if (res.ok) {
        mostrarNotificacion('¡Orden confirmada exitosamente! ✅');
        setTimeout(() => window.location.href = 'index.html', 2000);
      } else {
        mostrarNotificacion('Error al confirmar la orden ❌');
      }
    }

    cargarCarrito();
  </script>

</body>
</html>
