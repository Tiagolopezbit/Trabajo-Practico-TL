<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrito - E-Commerce</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; }
    nav {
      background: #2c3e50;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    nav h1 { color: white; font-size: 24px; }
    nav div a {
      color: white;
      text-decoration: none;
      margin-left: 20px;
    }
    .container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
    h2 { margin-bottom: 20px; color: #2c3e50; }
    .carrito-item {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      margin-bottom: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .carrito-item h3 { margin-bottom: 5px; }
    .carrito-item p { color: #666; }
    .carrito-item .precio { font-size: 18px; font-weight: bold; color: #2c3e50; }
    .carrito-item button {
      background: #e74c3c;
      color: white;
      border: none;
      padding: 8px 15px;
      border-radius: 5px;
      cursor: pointer;
    }
    .total {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      text-align: right;
    }
    .total h3 { font-size: 22px; margin-bottom: 15px; }
    .total button {
      background: #2ecc71;
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }
    .total button:hover { background: #27ae60; }
    .vacio { text-align: center; padding: 40px; color: #666; }
  </style>
</head>
<body>

  <nav>
    <h1>🛒 E-Commerce</h1>
    <div>
      <a href="index.html">Inicio</a>
      <a href="login.html">Login</a>
      <a href="carrito.html">Carrito 🛒</a>
    </div>
  </nav>

  <div class="container">
    <h2>🛒 Mi Carrito</h2>
    <div id="carrito-items"></div>
    <div id="total-section"></div>
  </div>

  <script>
    const API = 'http://localhost:3000';
    const token = localStorage.getItem('token');

    if (!token) {
      alert('Debes iniciar sesión');
      window.location.href = 'login.html';
    }

    async function cargarCarrito() {
      try {
        const res = await fetch(`${API}/api/carrito`, {
          headers: { 'authorization': token }
        });
        const data = await res.json();
        const container = document.getElementById('carrito-items');
        const totalSection = document.getElementById('total-section');

        if (!data.items || data.items.length === 0) {
          container.innerHTML = '<div class="vacio"><h3>Tu carrito está vacío</h3><p><a href="index.html">Ver productos</a></p></div>';
          return;
        }

        container.innerHTML = data.items.map(item => `
          <div class="carrito-item">
            <div>
              <h3>${item.producto.nombre}</h3>
              <p>Cantidad: ${item.cantidad}</p>
            </div>
            <div class="precio">$${item.producto.precio * item.cantidad}</div>
            <button onclick="quitarItem('${item.producto._id}')">Quitar</button>
          </div>
        `).join('');

        totalSection.innerHTML = `
          <div class="total">
            <h3>Total: $${data.total}</h3>
            <button onclick="confirmarOrden()">Confirmar Orden ✅</button>
          </div>
        `;
      } catch (error) {
        document.getElementById('carrito-items').innerHTML = '<p>Error al cargar el carrito</p>';
      }
    }

    async function quitarItem(productoId) {
      await fetch(`${API}/api/carrito/${productoId}`, {
        method: 'DELETE',
        headers: { 'authorization': token }
      });
      cargarCarrito();
    }

    async function confirmarOrden() {
      const direccion = prompt('Ingresá tu dirección de envío:');
      if (!direccion) return;

      const res = await fetch(`${API}/api/ordenes`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'authorization': token
        },
        body: JSON.stringify({ direccionEnvio: direccion })
      });

      if (res.ok) {
        alert('¡Orden confirmada exitosamente! ✅');
        window.location.href = 'index.html';
      } else {
        alert('Error al confirmar la orden');
      }
    }

    cargarCarrito();
  </script>

</body>
</html>
