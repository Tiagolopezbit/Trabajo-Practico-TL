<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GOTTI Store</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #111; color: white; }

    .notificacion {
      position: fixed;
      top: 20px;
      right: 20px;
      background: #1a1a1a;
      border: 1px solid white;
      color: white;
      padding: 15px 25px;
      letter-spacing: 1px;
      font-size: 14px;
      display: none;
      z-index: 999;
    }

    nav {
      background: #000;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid white;
    }
    nav h1 { color: white; font-size: 28px; letter-spacing: 4px; font-weight: bold; }
    nav div a {
      color: white;
      text-decoration: none;
      margin-left: 20px;
      font-size: 15px;
      letter-spacing: 1px;
    }
    nav div a:hover { color: #aaa; }

    .hero {
      background: #000;
      color: white;
      text-align: center;
      padding: 80px 20px;
      border-bottom: 1px solid #333;
    }
    .hero h2 { font-size: 42px; letter-spacing: 6px; margin-bottom: 15px; }
    .hero p { font-size: 16px; color: #aaa; margin-bottom: 30px; letter-spacing: 2px; }
    .hero button {
      background: white;
      color: black;
      border: none;
      padding: 14px 40px;
      font-size: 16px;
      letter-spacing: 2px;
      cursor: pointer;
      font-weight: bold;
    }
    .hero button:hover { background: #ddd; }

    .productos-section { padding: 40px 30px; }
    .productos-section h2 {
      margin-bottom: 25px;
      font-size: 22px;
      letter-spacing: 3px;
      border-bottom: 1px solid #333;
      padding-bottom: 10px;
    }

    .productos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
    }

    .producto-card {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 5px;
      padding: 20px;
    }
    .producto-card h3 { margin-bottom: 10px; letter-spacing: 1px; }
    .producto-card p { color: #aaa; margin-bottom: 10px; font-size: 14px; }
    .producto-card .precio {
      font-size: 22px;
      font-weight: bold;
      color: white;
      margin-bottom: 15px;
    }
    .producto-card button {
      width: 100%;
      background: white;
      color: black;
      border: none;
      padding: 10px;
      font-size: 15px;
      font-weight: bold;
      letter-spacing: 1px;
      cursor: pointer;
    }
    .producto-card button:hover { background: #ddd; }

    footer {
      background: #000;
      color: #aaa;
      text-align: center;
      padding: 20px;
      margin-top: 40px;
      border-top: 1px solid #333;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>

  <div class="notificacion" id="notificacion"></div>

  <nav>
    <h1>GOTTI</h1>
    <div>
      <a href="index.html">INICIO</a>
      <a href="login.html">LOGIN</a>
      <a href="registro.html">REGISTRO</a>
      <a href="carrito.html">CARRITO 🛒</a>
      <a href="admin.html">ADMIN</a>
    </div>
  </nav>

  <div class="hero">
    <h2>BIENVENIDO A GOTTI</h2>
    <p>ENCONTRÁ LOS MEJORES PRODUCTOS AL MEJOR PRECIO</p>
    <button onclick="window.location.href='registro.html'">REGISTRARSE</button>
  </div>

  <div class="productos-section">
    <h2>PRODUCTOS DISPONIBLES</h2>
    <div class="productos-grid" id="productos-grid">
      <p style="color:#aaa">Cargando productos...</p>
    </div>
  </div>

  <footer>
    <p>© 2026 GOTTI — TODOS LOS DERECHOS RESERVADOS</p>
  </footer>

  <script>
    const API = 'http://localhost:3000';

    function mostrarNotificacion(texto) {
      const n = document.getElementById('notificacion');
      n.textContent = texto;
      n.style.display = 'block';
      setTimeout(() => { n.style.display = 'none'; }, 2000);
    }

    async function cargarProductos() {
      try {
        const res = await fetch(`${API}/api/productos`);
        const productos = await res.json();
        const grid = document.getElementById('productos-grid');

        if (productos.length === 0) {
          grid.innerHTML = '<p style="color:#aaa">No hay productos disponibles.</p>';
          return;
        }

        grid.innerHTML = productos.map(p => `
          <div class="producto-card">
            <h3>${p.nombre}</h3>
            <p>${p.descripcion || 'Sin descripción'}</p>
            <div class="precio">₲ ${p.precio.toLocaleString()}</div>
            <button onclick="agregarAlCarrito('${p._id}')">AGREGAR AL CARRITO</button>
          </div>
        `).join('');
      } catch (error) {
        document.getElementById('productos-grid').innerHTML = '<p style="color:#aaa">Error al cargar productos.</p>';
      }
    }

    async function agregarAlCarrito(id) {
      const token = localStorage.getItem('token');
      if (!token) {
        window.location.href = 'login.html';
        return;
      }

      try {
        const res = await fetch(`${API}/api/carrito`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'authorization': token
          },
          body: JSON.stringify({ productoId: id, cantidad: 1 })
        });

        if (res.ok) {
          mostrarNotificacion('Producto agregado al carrito ✅');
        } else {
          mostrarNotificacion('Error al agregar al carrito ❌');
        }
      } catch (error) {
        mostrarNotificacion('Error al conectar con el servidor ❌');
      }
    }

    cargarProductos();
  </script>

</body>
</html>
