<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Commerce</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; }
    
    nav {
      background: #2c3e50;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    nav h1 { color: white; font-size: 24px; }
    nav div a {
      color: white;
      text-decoration: none;
      margin-left: 20px;
      font-size: 16px;
    }
    nav div a:hover { color: #3498db; }

    .hero {
      background: #3498db;
      color: white;
      text-align: center;
      padding: 60px 20px;
    }
    .hero h2 { font-size: 36px; margin-bottom: 10px; }
    .hero p { font-size: 18px; margin-bottom: 20px; }
    .hero button {
      background: white;
      color: #3498db;
      border: none;
      padding: 12px 30px;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
    }

    .productos-section { padding: 40px 30px; }
    .productos-section h2 { margin-bottom: 20px; font-size: 24px; }
    
    .productos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
    }

    .producto-card {
      background: white;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .producto-card h3 { margin-bottom: 10px; }
    .producto-card p { color: #666; margin-bottom: 10px; }
    .producto-card .precio {
      font-size: 20px;
      font-weight: bold;
      color: #2c3e50;
      margin-bottom: 15px;
    }
    .producto-card button {
      width: 100%;
      background: #3498db;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }
    .producto-card button:hover { background: #2980b9; }

    footer {
      background: #2c3e50;
      color: white;
      text-align: center;
      padding: 20px;
      margin-top: 40px;
    }
  </style>
</head>
<body>

  <nav>
    <h1>🛒 E-Commerce</h1>
    <div>
      <a href="index.html">Inicio</a>
      <a href="login.html">Login</a>
      <a href="registro.html">Registro</a>
      <a href="carrito.html">Carrito 🛒</a>
      <a href="admin.html">Admin</a>
    </div>
  </nav>

  <div class="hero">
    <h2>Bienvenido a nuestra tienda</h2>
    <p>Encontrá los mejores productos al mejor precio</p>
    <button onclick="window.location.href='registro.html'">Registrarse</button>
  </div>

  <div class="productos-section">
    <h2>Productos disponibles</h2>
    <div class="productos-grid" id="productos-grid">
      <p>Cargando productos...</p>
    </div>
  </div>

  <footer>
    <p>© 2026 E-Commerce - Todos los derechos reservados</p>
  </footer>

  <script>
    const API = 'http://localhost:3000';

    async function cargarProductos() {
      try {
        const res = await fetch(`${API}/api/productos`);
        const productos = await res.json();
        const grid = document.getElementById('productos-grid');

        if (productos.length === 0) {
          grid.innerHTML = '<p>No hay productos disponibles.</p>';
          return;
        }

        grid.innerHTML = productos.map(p => `
          <div class="producto-card">
            <h3>${p.nombre}</h3>
            <p>${p.descripcion || 'Sin descripción'}</p>
            <div class="precio">$${p.precio}</div>
            <button onclick="agregarAlCarrito('${p._id}')">Agregar al carrito</button>
          </div>
        `).join('');
      } catch (error) {
        document.getElementById('productos-grid').innerHTML = '<p>Error al cargar productos.</p>';
      }
    }

    function agregarAlCarrito(id) {
      const token = localStorage.getItem('token');
      if (!token) {
        alert('Debes iniciar sesión para agregar productos al carrito');
        window.location.href = 'login.html';
        return;
      }
      alert('Producto agregado al carrito ✅');
    }

    cargarProductos();
  </script>

</body>
</html>
